packages:
  - "apps/*"
  - "packages/*"

allowBuilds:
  '@nestjs/core': true
  '@prisma/client': true
  '@prisma/engines': true
  '@scarf/scarf': false
  argon2: true
  prisma: true
  sharp: true
  unrs-resolver: true

onlyBuiltDependencies:
  - argon2
  - "@nestjs/core"
  - "@prisma/client"
  - "@prisma/engines"
  - prisma
  - sharp
  - unrs-resolver
