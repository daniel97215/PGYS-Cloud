services:
  postgres:
    image: postgres:17-alpine
    container_name: pgys-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?Définir POSTGRES_DB dans .env}
      POSTGRES_USER: ${POSTGRES_USER:?Définir POSTGRES_USER dans .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Définir POSTGRES_PASSWORD dans .env}
    ports:
      - "5432:5432"
    volumes:
      - pgys_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgys_postgres_data:
